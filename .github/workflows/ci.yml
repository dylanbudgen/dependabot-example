name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/website/package-lock.json

      - run: npm ci
      - run: npm run build

  build-backend-dotnet:
    name: Build Backend (dotnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore services/backend-dotnet/ExampleApp.Api.csproj
      - run: dotnet build services/backend-dotnet/ExampleApp.Api.csproj --no-restore --configuration Release

  build-backend-java:
    name: Build Backend (java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend-java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: mvn package --batch-mode
